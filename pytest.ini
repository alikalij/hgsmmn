[pytest]
pythonpath = .

testpaths = pointcept/models/point_transformer_v3/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =    
    sanity: quick sanity tests
    logic: logic/unit behavior tests
    gradients: gradient flow tests
    edge_case: edge case tests
    integration: integration tests

addopts = 
    --strict-markers
    --tb=short
    -ra

minversion = 7.0
